  <script>
    const CONFIG = {
      IMAGES_PER_PAGE: 40,
      CACHE_KEY: 'image-gallery-data-v5',
      CACHE_DURATION: 24 * 60 * 60 * 1000,
      LAZY_LOAD_ROOT_MARGIN: '200px',
      THUMBNAIL_WIDTH: 400,
      INDEX_URL: 'data/image-index.json?v=' + Date.now()
    };

    let imageData = {};
    let categoryNames = {};
    let currentType = '';
    let currentSubCategory = '全部';
    let currentPage = 1;
    let currentImages = [];
    let currentImageIndex = 0;
    let lazyObserver = null;
    let totalImages = 0;

    // 从URL获取参数
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        type: params.get('type') || 'avatar',
        category: params.get('category') || '全部',
        image: params.get('image') || null,
        page: parseInt(params.get('page')) || 1
      };
    }

    // 更新URL参数
    function updateUrlParams() {
      const params = new URLSearchParams();
      if (currentType) params.set('type', currentType);
      if (currentSubCategory && currentSubCategory !== '全部') params.set('category', currentSubCategory);
      if (currentPage > 1) params.set('page', currentPage);
      
      const newUrl = `${window.location.origin}${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
      window.history.replaceState({}, '', newUrl);
    }

    function getThumbnailUrl(url, width = CONFIG.THUMBNAIL_WIDTH) {
      if (!url) return url;
      try {
        const urlObj = new URL(url);
        if (urlObj.hostname.includes('wsrv.nl')) return url;
        return `https://wsrv.nl/?url=${encodeURIComponent(url)}&w=${width}&q=85&output=webp&fit=cover`;
      } catch (e) {
        return url;
      }
    }

    function getCache() {
      try {
        const cached = localStorage.getItem(CONFIG.CACHE_KEY);
        if (cached) {
          const data = JSON.parse(cached);
          if (Date.now() - data.timestamp < CONFIG.CACHE_DURATION) {
            return data;
          }
        }
      } catch (e) {
        console.warn('读取缓存失败:', e);
      }
      return null;
    }

    function setCache(data) {
      try {
        localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
          ...data,
          timestamp: Date.now()
        }));
      } catch (e) {
        console.warn('写入缓存失败:', e);
      }
    }

    function showCacheStatus(show) {
      const el = document.getElementById('cacheStatus');
      if (show) {
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
      }
    }

    function initLazyLoad() {
      if (lazyObserver) lazyObserver.disconnect();
      
      lazyObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            const src = img.dataset.src;
            if (src && !img.src) {
              img.src = src;
              img.onload = () => {
                img.classList.add('loaded');
                img.closest('.card-image-container')?.classList.add('loaded');
              };
              img.onerror = () => {
                img.src = img.dataset.original || src;
              };
            }
            lazyObserver.unobserve(img);
          }
        });
      }, { rootMargin: CONFIG.LAZY_LOAD_ROOT_MARGIN });

      document.querySelectorAll('img[data-src]').forEach(img => {
        lazyObserver.observe(img);
      });
    }

    async function loadData() {
      const content = document.getElementById('content');
      
      const cached = getCache();
      if (cached && cached.imageData) {
        console.log('从缓存加载');
        imageData = cached.imageData;
        categoryNames = cached.categoryNames || {};
        totalImages = Object.values(imageData).reduce((sum, arr) => sum + arr.length, 0);
        showCacheStatus(true);
        initApp();
        return;
      }
      
      content.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div class="loading-progress">正在加载图片数据...</div>
        </div>
      `;
      
      try {
        const response = await fetch(CONFIG.INDEX_URL);
        if (!response.ok) throw new Error('加载数据失败');
        
        const data = await response.json();
        imageData = data.imageData || {};
        categoryNames = data.categoryNames || {};
        totalImages = Object.values(imageData).reduce((sum, arr) => sum + arr.length, 0);
        
        setCache({ imageData, categoryNames });
        initApp();
      } catch (error) {
        console.error('加载失败:', error);
        content.innerHTML = `
          <div class="loading">
            <p>加载失败，请刷新重试</p>
            <button onclick="location.reload()" style="margin-top: 16px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">刷新页面</button>
          </div>
        `;
      }
    }

    function initApp() {
      const categories = Object.keys(imageData).filter(cat => imageData[cat]?.length > 0);
      
      if (categories.length === 0) {
        document.getElementById('content').innerHTML = '<div class="loading"><p>暂无图片数据</p></div>';
        return;
      }
      
      // 处理URL参数
      const params = getUrlParams();
      if (params.type && imageData[params.type]) {
        currentType = params.type;
      } else if (!currentType || !imageData[currentType]) {
        currentType = categories[0];
      }
      
      if (params.category) {
        currentSubCategory = params.category;
      }
      
      if (params.page) {
        currentPage = params.page;
      }
      
      document.getElementById('headerStats').textContent = '';
      
      loadNavigation(categories);
      render();
      updateUrlParams();
      

      
      // 如果有图片ID参数，打开模态框
      if (params.image) {
        setTimeout(() => {
          const imageIndex = currentImages.findIndex(img => img.id === params.image);
          if (imageIndex !== -1) {
            openModal(imageIndex);
          }
        }, 500);
      }
    }

    function loadNavigation(categories) {
      const nav = document.getElementById('nav');
      nav.innerHTML = categories.map(category => {
        const name = categoryNames[category] || category;
        return `<button class="${category === currentType ? 'active' : ''}" onclick="showCategory('${category}', this)">${name}</button>`;
      }).join('');
    }

    function render() {
      const content = document.getElementById('content');
      const items = imageData[currentType] || [];
      
      const subCategoryMap = {};
      items.forEach(item => {
        const cat = item.category || '未分类';
        if (!subCategoryMap[cat]) subCategoryMap[cat] = [];
        subCategoryMap[cat].push(item);
      });
      
      let filteredItems = items;
      if (currentSubCategory !== '全部') {
        filteredItems = items.filter(item => (item.category || '未分类') === currentSubCategory);
      }
      
      currentImages = filteredItems;
      
      const subCategories = ['全部', ...Object.keys(subCategoryMap)];
      const totalPages = Math.ceil(filteredItems.length / CONFIG.IMAGES_PER_PAGE);
      const startIndex = (currentPage - 1) * CONFIG.IMAGES_PER_PAGE;
      const pageItems = filteredItems.slice(startIndex, startIndex + CONFIG.IMAGES_PER_PAGE);
      
      const categoryName = categoryNames[currentType] || currentType;
      const totalInCategory = items.length;
      
      // 更新面包屑导航
      document.getElementById('breadcrumbCategory').textContent = categoryName;
      if (currentSubCategory !== '全部') {
        document.getElementById('breadcrumbSubCategory').textContent = currentSubCategory;
        document.getElementById('breadcrumbSubCategory').style.display = 'inline';
        document.getElementById('breadcrumbSubCategorySeparator').style.display = 'inline';
      } else {
        document.getElementById('breadcrumbSubCategory').style.display = 'none';
        document.getElementById('breadcrumbSubCategorySeparator').style.display = 'none';
      }
      
      let html = `
        <div class="category">
          <div class="category-header">
            <h2>${categoryName}</h2>
          </div>
          <div class="sub-categories">
            ${subCategories.map(cat => {
              return `<button class="${cat === currentSubCategory ? 'active' : ''}" onclick="filterSubCategory('${cat}', this)">${cat}</button>`;
            }).join('')}
          </div>
          <div class="grid">
            ${pageItems.map((item, idx) => `
              <div class="card" onclick="openModal(${startIndex + idx})">
                <div class="card-image-container">
                  <img data-src="${getThumbnailUrl(item.image)}" data-original="${item.image}" alt="${item.title} - ${item.category || '未分类'}${item.tags && item.tags.length > 0 ? ' - ' + item.tags.join(' ') : ''}" loading="lazy" width="400" height="400">
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      
      if (totalPages > 1) {
        html += renderPagination(currentPage, totalPages);
      }
      
      content.innerHTML = html;
      initLazyLoad();
    }

    function renderPagination(current, total) {
      const buttons = [];
      const delta = 2;
      
      buttons.push(`<button onclick="goToPage(${current - 1})" ${current === 1 ? 'disabled' : ''}>&#10094;</button>`);
      
      for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || (i >= current - delta && i <= current + delta)) {
          buttons.push(`<button class="${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`);
        } else if (i === current - delta - 1 || i === current + delta + 1) {
          buttons.push(`<button disabled>...</button>`);
        }
      }
      
      buttons.push(`<button onclick="goToPage(${current + 1})" ${current === total ? 'disabled' : ''}>&#10095;</button>`);
      
      buttons.push(`
        <div class="page-jump">
          <input type="number" min="1" max="${total}" value="${current}" id="pageJumpInput" onkeypress="if(event.key==='Enter')jumpToPage(${total})">
          <button onclick="jumpToPage(${total})">跳转</button>
        </div>
      `);
      
      buttons.push(`<span class="pagination-info">${current} / ${total}</span>`);
      
      return `<div class="pagination">${buttons.join('')}</div>`;
    }

    function goToPage(page) {
      const totalPages = Math.ceil(currentImages.length / CONFIG.IMAGES_PER_PAGE);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      render();
      updateUrlParams();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function jumpToPage(total) {
      const input = document.getElementById('pageJumpInput');
      const page = parseInt(input.value);
      if (page >= 1 && page <= total) {
        goToPage(page);
      }
    }

    function showCategory(type, btn) {
      currentType = type;
      currentSubCategory = '全部';
      currentPage = 1;
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      render();
      updateUrlParams();
    }

    function filterSubCategory(category, btn) {
      currentSubCategory = category;
      currentPage = 1;
      document.querySelectorAll('.sub-categories button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      render();
      updateUrlParams();
    }



    function openModal(index) {
      currentImageIndex = index;
      const img = currentImages[index];
      
      const modal = document.getElementById('imageModal');
      const modalImage = document.getElementById('modalImage');
      const modalTitle = document.getElementById('modalTitle');
      
      modalImage.src = img.image;
      modalImage.alt = `${img.title} - ${img.category || '未分类'}${img.tags && img.tags.length > 0 ? ' - ' + img.tags.join(' ') : ''}`;
      modalTitle.textContent = img.title;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
      
      // 更新URL添加图片ID参数
      const params = new URLSearchParams(window.location.search);
      params.set('image', img.id);
      const newUrl = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
      window.history.pushState({}, '', newUrl);
    }

    function downloadImage() {
      const img = currentImages[currentImageIndex];
      if (!img) return;
      
      const link = document.createElement('a');
      link.href = img.image;
      link.download = img.title || 'image.jpg';
      link.target = '_blank';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function shareImage() {
      const img = currentImages[currentImageIndex];
      if (!img) return;
      
      const shareData = {
        title: img.title || '高清图片',
        text: `查看这张精美图片：${img.title}`,
        url: window.location.href
      };
      
      if (navigator.share) {
        navigator.share(shareData).catch(err => {
          console.log('分享取消或失败:', err);
          copyToClipboard(window.location.href);
        });
      } else {
        copyToClipboard(window.location.href);
      }
    }

    function copyToClipboard(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          showToast('链接已复制到剪贴板');
        }).catch(() => {
          fallbackCopyToClipboard(text);
        });
      } else {
        fallbackCopyToClipboard(text);
      }
    }

    function fallbackCopyToClipboard(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('链接已复制到剪贴板');
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 12px 24px;
        border-radius: 25px;
        font-size: 14px;
        z-index: 10000;
        animation: fadeInUp 0.3s ease;
      `;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'fadeOutDown 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    function closeModal() {
      document.getElementById('imageModal').classList.remove('show');
      document.body.style.overflow = '';
      
      // 移除URL中的图片ID参数
      const params = new URLSearchParams(window.location.search);
      params.delete('image');
      const newUrl = `${window.location.origin}${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
      window.history.pushState({}, '', newUrl);
    }

    function prevImage() {
      currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
      const img = currentImages[currentImageIndex];
      document.getElementById('modalImage').src = img.image;
      document.getElementById('modalTitle').textContent = img.title;
      
      // 更新URL中的图片ID参数
      const params = new URLSearchParams(window.location.search);
      params.set('image', img.id);
      const newUrl = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
      window.history.pushState({}, '', newUrl);
    }

    function nextImage() {
      currentImageIndex = (currentImageIndex + 1) % currentImages.length;
      const img = currentImages[currentImageIndex];
      document.getElementById('modalImage').src = img.image;
      document.getElementById('modalTitle').textContent = img.title;
      
      // 更新URL中的图片ID参数
      const params = new URLSearchParams(window.location.search);
      params.set('image', img.id);
      const newUrl = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
      window.history.pushState({}, '', newUrl);
    }

    document.addEventListener('DOMContentLoaded', loadData);
    
    document.getElementById('imageModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      const modal = document.getElementById('imageModal');
      if (!modal.classList.contains('show')) return;
      
      if (e.key === 'Escape') closeModal();
      else if (e.key === 'ArrowLeft') prevImage();
      else if (e.key === 'ArrowRight') nextImage();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - 高清图片素材库</title>
  <meta name="description" content="抱歉，您访问的页面不存在。请返回首页浏览高清图片素材。">
  <meta name="keywords" content="404,页面未找到,图片素材,高清图片">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 16px;
      color: #111827;
    }
    p {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    .home-link {
      margin-top: 24px;
      font-size: 14px;
      color: #6b7280;
    }
    .home-link a {
      color: #667eea;
      text-decoration: none;
    }
    .home-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>页面未找到</h1>
    <p>抱歉，您访问的页面不存在或已被移除。</p>
    <p>请返回首页浏览我们的高清图片素材库，或者使用搜索功能查找您需要的图片。</p>
    <a href="/" class="btn">返回首页</a>
    <div class="home-link">
      或访问 <a href="/">tuji.farholme.com</a> 浏览更多图片素材
    </div>
  </div>
</body>
</html>
